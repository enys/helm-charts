name: Build image and lint chart

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/entra-app-exporter/**"
      - "charts/entra-app-exporter/**"
      - ".github/workflows/build-image-and-lint-chart.yml"
  push:
    branches:
      - main
    paths:
      - "apps/entra-app-exporter/**"
      - "charts/entra-app-exporter/**"
      - ".github/workflows/build-image-and-lint-chart.yml"

permissions: {}

jobs:
  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fail when app version already exists
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if ! git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | grep -q '^apps/entra-app-exporter/'; then
            echo "No app changes detected; skipping version uniqueness check."
            exit 0
          fi

          version="$(jq -r '.version' apps/entra-app-exporter/package.json)"
          if [ -z "${version}" ] || [ "${version}" = "null" ]; then
            echo "::error::Unable to read version from apps/entra-app-exporter/package.json"
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/v${version}" "refs/tags/${version}" | grep -q .; then
            echo "::error::App version ${version} already exists as a git tag. Bump apps/entra-app-exporter/package.json before merging."
            exit 1
          fi

          tmp_versions_file="$(mktemp)"
          if gh api --paginate "/users/${OWNER}/packages/container/entra-app-exporter/versions?per_page=100" > "${tmp_versions_file}" 2>/dev/null \
            || gh api --paginate "/orgs/${OWNER}/packages/container/entra-app-exporter/versions?per_page=100" > "${tmp_versions_file}" 2>/dev/null; then
            if jq -e --arg version "${version}" --arg vversion "v${version}" '.[] | .metadata.container.tags[]? | select(. == $version or . == $vversion)' "${tmp_versions_file}" >/dev/null; then
              echo "::error::App version ${version} already exists in ghcr.io/${OWNER}/entra-app-exporter. Bump apps/entra-app-exporter/package.json before merging."
              exit 1
            fi
          else
            echo "::warning::Could not query container package versions; skipping GHCR version uniqueness check."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image-tags
        run: |
          tags="ghcr.io/${{ github.repository_owner }}/entra-app-exporter:${{ github.sha }}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags}"$'\n'"ghcr.io/${{ github.repository_owner }}/entra-app-exporter:latest"
          fi

          current_semver_tag="$(git tag --points-at "${GITHUB_SHA}" --sort=-version:refname | grep -E '^(v)?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' | head -n 1 || true)"
          if [ -n "${current_semver_tag}" ]; then
            tags="${tags}"$'\n'"ghcr.io/${{ github.repository_owner }}/entra-app-exporter:${current_semver_tag}"
          fi

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: apps/entra-app-exporter
          file: apps/entra-app-exporter/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.image-tags.outputs.tags }}

  lint-chart:
    name: Lint Helm chart (ct lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.18.4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install yamllint yamale

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: v3.11.0

      - name: Run ct lint
        run: ct lint --chart-dirs charts --charts charts/entra-app-exporter

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build test image (load locally)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: apps/entra-app-exporter
          file: apps/entra-app-exporter/Dockerfile
          push: false
          load: true
          tags: entra-app-exporter:${{ github.sha }}

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Load test image into kind
        run: kind load docker-image entra-app-exporter:${{ github.sha }} --name chart-testing

      - name: Run ct install
        run: >
          ct install --chart-dirs charts --charts charts/entra-app-exporter
          --helm-extra-set-args
          "--set image.repository=entra-app-exporter --set image.tag=${{ github.sha }} --set image.pullPolicy=IfNotPresent"

  release-image:
    name: Create GitHub release for image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - build-image
      - lint-chart
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="image-${GITHUB_SHA}"
          semver_tag="$(git tag --points-at "${GITHUB_SHA}" | grep -E '^(v)?[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$' | head -n 1 || true)"
          semver_note=""
          if [ -n "${semver_tag}" ]; then
            semver_note=$'\n'"- ghcr.io/${{ github.repository_owner }}/entra-app-exporter:${semver_tag}"
          fi
          notes=$(cat <<EOF
          Container image published to GHCR:

          - ghcr.io/${{ github.repository_owner }}/entra-app-exporter:${{ github.sha }}
          - ghcr.io/${{ github.repository_owner }}/entra-app-exporter:latest${semver_note}
          EOF
          )
          gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || gh release create "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Image ${GITHUB_SHA}" \
            --notes "$notes"
