version: "3.8"

services:
  entra-app-exporter:
    build:
      context: ./apps/entra-app-exporter
      dockerfile: Dockerfile
      # Multi-platform build support via buildx bake
      platforms:
        - linux/amd64
        - linux/arm64
    image: entra-app-exporter:latest
    container_name: entra-app-exporter
    ports:
      - "9090:9090"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
