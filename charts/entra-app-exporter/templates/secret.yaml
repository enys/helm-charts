{{- if not .Values.azure.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "entra-app-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "entra-app-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  AZURE_TENANT_ID: {{ required "azure.tenantId is required" .Values.azure.tenantId | quote }}
  {{- if not .Values.azure.useManagedIdentity }}
  AZURE_CLIENT_ID: {{ required "azure.clientId is required when azure.useManagedIdentity=false" .Values.azure.clientId | quote }}
  AZURE_CLIENT_SECRET: {{ required "azure.clientSecret is required when azure.useManagedIdentity=false" .Values.azure.clientSecret | quote }}
  {{- else }}
  AZURE_CLIENT_ID: {{ .Values.azure.clientId | quote }}
  {{- end }}
{{- end }}
